version: '3.8'

services:
  broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - broker-data:/mosquitto/data
      - broker-logs:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-h", "127.0.0.1", "-p", "1883", "-t", "health/ping", "-E" ]
      interval: 10s
      timeout: 5s
      retries: 3

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-producer
    depends_on:
      broker:
        condition: service_healthy
    privileged: true
    devices:
      - "/dev/gpiochip4:/dev/gpiochip4"
    volumes:
      - ./:/app
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - producer.py
      - --device-id
      - "urn:dev:team05:pir-01"
      - --pin
      - "17"
      - --sample-interval
      - "0.1"
      - --cooldown
      - "5.0"
      - --min-high
      - "0.5"
      - --broker
      - "broker"
      - --port
      - "1883"
      - --topic
      - "smartbin/bin-01/pir-01/events"
      - --status-topic
      - "smartbin/bin-01/pir-01/status"
      - --qos
      - "1"
      - --verbose
  # Event Consumer (writes to file)
  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-consumer
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
      - output-data:/data
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
    command:
      - python
      - consumer.py
      - --broker
      - "broker"
      - --port
      - "1883"
      - --topic
      - "smartbin/bin-01/pir-01/events"
      - --qos
      - "1"
      - --out
      - "/data/motion_events.jsonl"
      - --verbose

volumes:
  broker-data:
  broker-logs:
  output-data:
